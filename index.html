<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>李俊辉 | 交互式数字档案</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #020205; 
            --glass-bg: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f0f0f2;
            --text-sub: #8a8a93;
            --accent-white: #ffffff;
            --accent-green: #00ff66;
            --font-sys: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            background-color: var(--bg-deep); color: var(--text-main);
            font-family: var(--font-sys); overflow-x: hidden;
        }

        /* --- 背景 Canvas --- */
        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; width: 100%; height: 100%; }

        /* --- 极简导航 --- */
        nav {
            position: fixed; top: 0; width: 100%; height: 60px;
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border); z-index: 100;
            display: flex; justify-content: center; align-items: center; gap: 30px;
        }
        nav a { color: var(--text-sub); text-decoration: none; font-size: 13px; transition: var(--transition); }
        nav a:hover { color: #fff; text-shadow: 0 0 10px #fff; }

        .container { max-width: 1000px; margin: 0 auto; padding: 120px 20px 40px; }
        section { margin-bottom: 100px; }

        /* --- Hero Section --- */
        .hero h1 { font-size: clamp(40px, 8vw, 80px); font-weight: 800; letter-spacing: -3px; line-height: 1; margin-bottom: 20px; }
        .hero p { color: var(--text-sub); font-size: 18px; max-width: 600px; margin-bottom: 30px; }
        
        .self-eval {
            background: rgba(255,255,255,0.03); border-left: 2px solid #fff;
            padding: 20px; font-size: 14px; color: #ccc; margin-bottom: 40px; line-height: 1.8;
        }

        /* --- 教育经历条 --- */
        .edu-bar {
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            padding: 20px; border-radius: 12px; margin-bottom: 50px;
            display: flex; flex-direction: column; gap: 10px;
        }
        .edu-main { display: flex; justify-content: space-between; font-weight: 600; }
        .edu-courses { font-size: 12px; color: var(--text-sub); font-family: var(--font-mono); }

        /* --- 项目卡片网格 --- */
        .section-title { font-size: 12px; color: var(--text-sub); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .bento-card {
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            padding: 25px; border-radius: 16px; transition: var(--transition); cursor: pointer;
        }
        .bento-card:hover { border-color: #fff; transform: translateY(-5px); background: rgba(255,255,255,0.05); }
        .card-time { font-family: var(--font-mono); font-size: 11px; color: #555; margin-bottom: 10px; display: block; }
        .card-tag { display: inline-block; font-size: 10px; padding: 2px 8px; border: 1px solid #333; border-radius: 4px; margin-bottom: 15px; }

        /* --- 终端留言板 --- */
        .terminal { background: #000; border: 1px solid #1a1a1a; border-radius: 12px; padding: 20px; font-family: var(--font-mono); }
        .terminal-header { color: #444; font-size: 12px; margin-bottom: 15px; border-bottom: 1px solid #111; padding-bottom: 10px; }
        .terminal-output { height: 200px; overflow-y: auto; font-size: 13px; color: #888; margin-bottom: 15px; }
        .terminal-input-wrap { display: flex; align-items: center; color: var(--accent-green); }
        .terminal-input-wrap input {
            background: transparent; border: none; color: #fff; font-family: var(--font-mono);
            outline: none; flex: 1; margin-left: 10px; font-size: 13px;
        }

        /* --- 详情弹窗 (Modal) --- */
        .modal-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
            z-index: 1000; display: none; justify-content: center; align-items: center;
        }
        .modal-content {
            background: #050505; border: 1px solid var(--glass-border);
            width: 90%; max-width: 600px; padding: 40px; border-radius: 20px; position: relative;
        }
        .close-btn { position: absolute; top: 20px; right: 20px; color: #555; cursor: pointer; font-size: 24px; }
        .detail-body { line-height: 1.8; color: #ccc; white-space: pre-wrap; margin-top: 20px; }

        /* 录入表单容器 */
        .form-group { margin-bottom: 15px; }
        .form-group input, .form-group textarea {
            width: 100%; background: #111; border: 1px solid #222; color: #fff; padding: 10px; border-radius: 4px;
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <nav>
        <a href="#hero">ARCHIVE</a>
        <a href="#experience">PROJECTS</a>
        <a href="#guestbook">TERMINAL</a>
    </nav>

    <div class="container">
        <section class="hero" id="hero">
            <h1>李俊辉<span>.</span></h1>
            <p>网络空间安全 | Web 安全攻防实习生</p>
            <div class="self-eval" id="self-eval-text">
                </div>
            
            <div class="edu-bar">
                <div class="edu-main">
                    <span>广东科技学院 (GKC)</span>
                    <span>2023.09 - 2027.06</span>
                </div>
                <div style="font-size: 14px;">网络空间安全 · 本科 · GPA 3.05</div>
                <div class="edu-courses">核心课程：网络安全编程、代码审计、Linux原理与应用、MySQL、密码学</div>
            </div>
        </section>

        <section id="experience">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div class="section-title">实战档案 // SELECTED PROJECTS</div>
                <button onclick="openModal('add-modal')" style="background:none; border:1px solid #333; color:#555; padding:4px 12px; border-radius:4px; font-size:10px; cursor:pointer;">+ 录入新经历</button>
            </div>
            <div class="grid" id="exp-grid"></div>
        </section>

        <section id="guestbook">
            <div class="section-title">加密通信终端 // ENCRYPTED TERMINAL</div>
            <div class="terminal">
                <div class="terminal-header">SYSTEM READY - AUTHORIZED ACCESS ONLY</div>
                <div class="terminal-output" id="term-out"></div>
                <form class="terminal-input-wrap" id="term-form">
                    <span>visitor@ljh_arch:~$</span>
                    <input type="text" id="term-in" autocomplete="off" placeholder="输入指令...">
                </form>
            </div>
        </section>
    </div>

    <div class="modal-overlay" id="detail-modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('detail-modal')">×</span>
            <div id="modal-time" style="font-family: var(--font-mono); font-size: 12px; color: #555;"></div>
            <h2 id="modal-title" style="margin: 10px 0;"></h2>
            <div id="modal-tag" class="card-tag"></div>
            <div class="detail-body" id="modal-body"></div>
        </div>
    </div>

    <div class="modal-overlay" id="add-modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('add-modal')">×</span>
            <h3>录入新档案</h3>
            <form id="add-form" style="margin-top:20px;">
                <div class="form-group"><input type="text" id="in-title" placeholder="项目名称" required></div>
                <div class="form-group"><input type="text" id="in-time" placeholder="时间 (如 2026.03)" required></div>
                <div class="form-group"><input type="text" id="in-tag" placeholder="标签 (如 CTF / 安全开发)" required></div>
                <div class="form-group"><textarea id="in-body" rows="5" placeholder="详细内容..." required></textarea></div>
                <button type="submit" style="width:100%; padding:10px; background:#fff; border:none; cursor:pointer;">存入档案库</button>
            </form>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // --- 1. 银河背景逻辑 ---
        const canvas = document.getElementById('bg-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 2000);
        camera.position.z = 500;

        const starCount = 12000;
        const pos = new Float32Array(starCount * 3);
        for(let i=0; i<starCount*3; i++) pos[i] = (Math.random()-0.5)*2000;
        const geo = new THREE.BufferGeometry();
        geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        const mat = new THREE.PointsMaterial({ size: 1.5, color: 0xffffff, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending });
        const stars = new THREE.Points(geo, mat);
        scene.add(stars);

        function animate() {
            requestAnimationFrame(animate);
            stars.rotation.y += 0.0003; // 极慢自转
            stars.rotation.x += 0.0001;
            renderer.render(scene, camera);
        }
        animate();

        // --- 2. 简历数据逻辑 ---
        const selfEval = "“具备扎实的 Web 安全攻防理论基础与实战漏洞挖掘能力，熟练掌握主流安全测试工具；拥有良好的技术文档撰写与沟通逻辑，能从开发视角理解安全合规需求；学习能力强，能快速融入互联网大厂的工作节奏。”";
        document.getElementById('self-eval-text').innerText = selfEval;

        const initialExps = [
            { id: 1, title: "PHP 新闻管理系统开发与加固", time: "2025.11 - 2025.12", tag: "安全开发", body: "【安全开发实践】独立使用 PHP+MySQL 开发动态新闻管理系统，实现了用户鉴权、内容发布与管理模块。\n【防御逻辑实现】针对 SQL 注入风险，全站采用 PDO 预编译技术；针对 XSS 风险，对前端输出数据实施了严格的 HTML 实体转义处理。" },
            { id: 2, title: "Web 漏洞攻防演练与原理分析", time: "2025.12 - 至今", tag: "漏洞挖掘", body: "【漏洞挖掘】利用 Burp Suite 对弱口令接口进行字典爆破；深入研究 SQL 注入原理，手工构造联合查询与盲注 Payload。\n【复现修复】完整复现存储型与反射型 XSS 攻击链，从 PHP 源码层面分析漏洞成因。" },
            { id: 3, title: "蓝桥杯/CTF 竞赛序列", time: "2025 - 2026", tag: "竞赛实战", body: "【CTF 实战】参与湾区杯&羊城杯，利用 Burp Suite 分析流量，识别并利用漏洞。\n【算法训练】第十六届蓝桥杯 Python 组高强度训练，具备编写自动化安全测试脚本的底层代码能力。" }
        ];

        function renderExps() {
            const grid = document.getElementById('exp-grid');
            grid.innerHTML = initialExps.map(exp => `
                <div class="bento-card" onclick="showDetail(${exp.id})">
                    <span class="card-time">${exp.time}</span>
                    <h3 style="font-size:16px; margin-bottom:10px;">${exp.title}</h3>
                    <div class="card-tag">${exp.tag}</div>
                    <p style="font-size:12px; color:var(--text-sub);">点击查看技术卷宗...</p>
                </div>
            `).join('');
        }
        renderExps();

        // --- 3. 弹窗交互 ---
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        
        function showDetail(id) {
            const exp = initialExps.find(e => e.id === id);
            if(exp) {
                document.getElementById('modal-title').innerText = exp.title;
                document.getElementById('modal-time').innerText = exp.time;
                document.getElementById('modal-tag').innerText = exp.tag;
                document.getElementById('modal-body').innerText = exp.body;
                openModal('detail-modal');
            }
        }

        // --- 4. 终端修复逻辑 (回车发送) ---
        const termForm = document.getElementById('term-form');
        const termOut = document.getElementById('term-out');
        const termIn = document.getElementById('term-in');

        termForm.addEventListener('submit', (e) => {
            e.preventDefault(); // 阻止刷新页面
            const cmd = termIn.value.trim();
            if(!cmd) return;

            const time = new Date().toLocaleTimeString('en-GB');
            const line = document.createElement('div');
            line.style.marginBottom = '5px';
            line.innerHTML = `<span style="color:#333;">[${time}]</span> <span style="color:#eee;">Visitor:</span> ${cmd}`;
            
            termOut.appendChild(line);
            termOut.scrollTop = termOut.scrollHeight;
            termIn.value = '';

            // 彩蛋回复
            if(cmd.toLowerCase() === 'help') {
                setTimeout(() => {
                    const res = document.createElement('div');
                    res.innerHTML = `<span style="color:var(--accent-green);">SYSTEM:</span> 可用命令: clear, status, about`;
                    termOut.appendChild(res);
                }, 500);
            }
        });

        // 录入新经历逻辑
        document.getElementById('add-form').onsubmit = (e) => {
            e.preventDefault();
            const newExp = {
                id: Date.now(),
                title: document.getElementById('in-title').value,
                time: document.getElementById('in-time').value,
                tag: document.getElementById('in-tag').value,
                body: document.getElementById('in-body').value
            };
            initialExps.unshift(newExp);
            renderExps();
            closeModal('add-modal');
            e.target.reset();
        };
    </script>
</body>
</html>
